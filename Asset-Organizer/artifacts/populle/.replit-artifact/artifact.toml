kind = "web"
previewPath = "/"
title = "Populle - World Population Visualization"
version = "1.0.0"
id = "artifacts/populle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22287
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/populle run dev"

[services.env]
PORT = "22287"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/populle", "run", "build"]
publicDir = "artifacts/populle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
