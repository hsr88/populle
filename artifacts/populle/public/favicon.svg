<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background matching the site's dark theme with primary cyan color -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="180" height="180" rx="36" fill="url(#bgGradient)"/>
  
  <!-- Stylized "P" letter for Populle with population/city theme -->
  <g transform="translate(36, 36)">
    <!-- Main circle representing globe/world -->
    <circle cx="54" cy="54" r="40" stroke="url(#iconGradient)" stroke-width="8" fill="none" opacity="0.9"/>
    
    <!-- Inner P letter -->
    <path d="M54 14 L54 94 M54 14 L74 14 C94 14 104 24 104 44 C104 64 94 74 74 74 L54 74" 
          stroke="url(#iconGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Dots representing population -->
    <circle cx="30" cy="80" r="6" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="46" cy="90" r="5" fill="url(#iconGradient)" opacity="0.6"/>
    <circle cx="18" cy="70" r="4" fill="url(#iconGradient)" opacity="0.5"/>
  </g>
</svg>
